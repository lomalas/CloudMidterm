name: Deploy Economy Simulator

on:
  push:
    branches: [ "main" ]

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Deploy to Jetstream2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: exouser
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |

          cd ~/CloudMidterm
          git reset --hard origin/main
          git pull origin main
          /home/exouser/CloudMidterm/venv/bin/pip install -r requirements.txt
          sudo systemctl restart econmysim